<svg xmlns="http://www.w3.org/2000/svg" width="276" height="156" viewBox="0 0 276 156" role="img" aria-label="Green tank and gray machine">
  <defs>
    <linearGradient id="tankGreen" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00e600"/>
      <stop offset=".55" stop-color="#00ff19"/>
      <stop offset="1" stop-color="#00d90f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#e0e0dd"/>
      <stop offset=".6" stop-color="#c8c8c6"/>
      <stop offset="1" stop-color="#b7b7b5"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#4f5659" stroke-width="3" stroke-linejoin="round">
    <!-- Horizontal pipe behind the tank and machine -->
    <rect x="0" y="51" width="119" height="69" fill="#c9c9c7"/>
    <rect x="88" y="72" width="31" height="29" fill="#b8b8b6" stroke="none"/>

    <!-- Tank neck and cap -->
    <rect x="49" y="8" width="20" height="29" fill="#c7c7c4"/>
    <rect x="40" y="0" width="36" height="8" fill="#e2e2df"/>

    <!-- Green vertical tank -->
    <rect x="24" y="36" width="68" height="98" rx="9" fill="url(#tankGreen)"/>
    <path d="M33 44h50M33 127h50" fill="none" stroke="#3aff3a" stroke-width="2" opacity=".55"/>
    <path d="M32 50v69" fill="none" stroke="#74ff65" stroke-width="2" opacity=".45"/>
    <path d="M86 47v76" fill="none" stroke="#00bd00" stroke-width="2" opacity=".6"/>

    <!-- Main machine body -->
    <path d="M113 44h139c14 0 24 21 24 43s-10 43-24 43H113z" fill="url(#metal)"/>
    <rect x="113" y="44" width="112" height="86" fill="#d9d9d6"/>

    <!-- Front grille -->
    <rect x="121" y="51" width="95" height="7" fill="#8f9494" stroke="#5b6061" stroke-width="2"/>
    <rect x="121" y="63" width="95" height="7" fill="#8f9494" stroke="#5b6061" stroke-width="2"/>
    <rect x="121" y="75" width="95" height="7" fill="#8f9494" stroke="#5b6061" stroke-width="2"/>
    <rect x="121" y="88" width="95" height="7" fill="#8f9494" stroke="#5b6061" stroke-width="2"/>

    <!-- Lower left slots -->
    <rect x="121" y="101" width="49" height="9" fill="#999e9e" stroke="#646969" stroke-width="2"/>
    <rect x="121" y="113" width="49" height="9" fill="#999e9e" stroke="#646969" stroke-width="2"/>

    <!-- Lower access panel -->
    <rect x="176" y="100" width="39" height="31" fill="#d4d4d1" stroke="#555b5d" stroke-width="2"/>

    <!-- Bottom support legs -->
    <rect x="148" y="130" width="17" height="26" fill="#bdbdb9"/>
    <rect x="226" y="130" width="17" height="26" fill="#bdbdb9"/>
  </g>
</svg>
