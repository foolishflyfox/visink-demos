<svg xmlns="http://www.w3.org/2000/svg" width="128" height="116" viewBox="0 0 128 116" role="img" aria-label="Electric actuator valve, pipe and background removed">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6e8e6"/>
      <stop offset=".5" stop-color="#cfd2cf"/>
      <stop offset="1" stop-color="#a9aeac"/>
    </linearGradient>
    <linearGradient id="metalH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bfc4c2"/>
      <stop offset=".5" stop-color="#e2e5e2"/>
      <stop offset="1" stop-color="#b2b7b5"/>
    </linearGradient>
    <radialGradient id="ball" cx=".38" cy=".32" r=".8">
      <stop offset="0" stop-color="#eef0ee"/>
      <stop offset=".6" stop-color="#cdd1cf"/>
      <stop offset="1" stop-color="#9ea3a1"/>
    </radialGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" stroke="#3a3f41" stroke-linejoin="round" stroke-linecap="round">

    <!-- ===== Electric actuator (top) ===== -->
    <!-- main housing -->
    <rect x="34" y="8" width="58" height="40" rx="4" fill="url(#metal)" stroke-width="1.4"/>
    <!-- top cover ridge -->
    <rect x="40" y="4" width="40" height="7" rx="2.5" fill="#d9dcd9" stroke-width="1.2"/>
    <!-- front display panel -->
    <rect x="60" y="20" width="24" height="17" rx="2" fill="#cdd0cd" stroke-width="1.1"/>
    <rect x="63" y="23" width="18" height="9" rx="1" fill="#2f3a3d" stroke="#222" stroke-width=".8"/>
    <rect x="65" y="25" width="14" height="5" rx="1" fill="#5b7e84"/>
    <!-- side terminal box -->
    <rect x="26" y="22" width="9" height="16" rx="1.5" fill="#c3c7c4" stroke-width="1.1"/>
    <!-- handwheel hub on top -->
    <circle cx="50" cy="14" r="6" fill="#b9bebc" stroke-width="1.2"/>
    <circle cx="50" cy="14" r="2" fill="#8a908d"/>

    <!-- ===== Yoke / mounting bracket ===== -->
    <path d="M48 48h30l-4 12H52z" fill="url(#metalH)" stroke-width="1.3"/>
    <rect x="55" y="60" width="16" height="6" rx="1" fill="#bcc1be" stroke-width="1.2"/>

    <!-- ===== Valve body (center) ===== -->
    <circle cx="63" cy="82" r="20" fill="url(#ball)" stroke-width="1.5"/>
    <!-- stem highlight -->
    <rect x="60" y="64" width="6" height="6" fill="#c7ccc9" stroke-width="1"/>

    <!-- ===== End flanges (kept, pipes removed) ===== -->
    <!-- left flange -->
    <rect x="35" y="72" width="9" height="20" rx="1.5" fill="url(#metalH)" stroke-width="1.3"/>
    <rect x="44" y="76" width="4" height="12" fill="#b6bbb8" stroke-width="1"/>
    <circle cx="39.5" cy="77" r="1.1" fill="#7c827f"/>
    <circle cx="39.5" cy="87" r="1.1" fill="#7c827f"/>
    <!-- right flange -->
    <rect x="82" y="72" width="9" height="20" rx="1.5" fill="url(#metalH)" stroke-width="1.3"/>
    <rect x="78" y="76" width="4" height="12" fill="#b6bbb8" stroke-width="1"/>
    <circle cx="86.5" cy="77" r="1.1" fill="#7c827f"/>
    <circle cx="86.5" cy="87" r="1.1" fill="#7c827f"/>
  </g>
</svg>
